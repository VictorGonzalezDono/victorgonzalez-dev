<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>45-Day Study Dashboard · TOEFL ITP + ML Engineering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── RESET & BASE ─────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-deep:#07091200;
  --bg-base:#0A0E1A;
  --bg-card:#111827;
  --bg-card-hover:#151d2e;
  --bg-elevated:#1A2035;
  --bg-input:#0f1729;
  --border-subtle:#1e2a42;
  --border-mid:#253352;
  --text-primary:#F0F4FF;
  --text-secondary:#8896B3;
  --text-tertiary:#4A5A7A;
  --text-muted:#2d3d5c;
  /* Category colors */
  --indigo:#818CF8;
  --indigo-bg:#1E1B4B;
  --indigo-border:#312e81;
  --indigo-glow:rgba(99,102,241,0.15);
  --emerald:#34D399;
  --emerald-bg:#064E3B;
  --emerald-border:#065f46;
  --emerald-glow:rgba(16,185,129,0.12);
  --amber:#FCD34D;
  --amber-bg:#451A03;
  --amber-border:#78350F;
  --amber-glow:rgba(245,158,11,0.12);
  /* UI */
  --radius-sm:6px;
  --radius-md:10px;
  --radius-lg:14px;
  --radius-xl:18px;
  --font-sans:'Inter',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --transition:all 0.2s cubic-bezier(0.4,0,0.2,1);
}

html{scroll-behavior:smooth}
body{
  font-family:var(--font-sans);
  background-color:var(--bg-base);
  color:var(--text-primary);
  min-height:100vh;
  line-height:1.6;
  /* Subtle dot-grid texture */
  background-image:
    radial-gradient(circle at 20% 20%, rgba(99,102,241,0.06) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(16,185,129,0.04) 0%, transparent 50%),
    radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size:auto,auto,28px 28px;
}

/* ─── LAYOUT ──────────────────────────────────────────────────── */
.app-shell{display:flex;min-height:100vh}

/* ─── SIDEBAR ─────────────────────────────────────────────────── */
.sidebar{
  width:280px;
  min-width:280px;
  background:var(--bg-card);
  border-right:1px solid var(--border-subtle);
  display:flex;
  flex-direction:column;
  position:sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
  padding:28px 20px 24px;
  gap:28px;
  scrollbar-width:thin;
  scrollbar-color:var(--border-mid) transparent;
}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:var(--border-mid);border-radius:4px}

.brand{display:flex;flex-direction:column;gap:6px}
.brand-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text-tertiary)}
.brand-title{font-size:15px;font-weight:700;color:var(--text-primary);line-height:1.3}
.brand-sub{font-size:11px;color:var(--text-secondary);line-height:1.5}

/* Progress ring */
.prog-section{display:flex;flex-direction:column;align-items:center;gap:12px}
.prog-ring-wrap{position:relative;width:120px;height:120px}
.prog-ring-wrap svg{transform:rotate(-90deg)}
.ring-track{fill:none;stroke:var(--border-subtle);stroke-width:8}
.ring-fill{fill:none;stroke:url(#ringGrad);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 0.6s cubic-bezier(0.4,0,0.2,1)}
.ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
.ring-pct{font-size:22px;font-weight:700;color:var(--text-primary);line-height:1}
.ring-days{font-size:10px;color:var(--text-secondary);font-weight:500}
.prog-detail{text-align:center}
.prog-count{font-size:13px;font-weight:600;color:var(--text-primary)}
.prog-count span{color:var(--indigo)}
.prog-sub{font-size:11px;color:var(--text-tertiary);margin-top:2px}

/* Heatmap */
.heatmap-section{}
.section-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:10px}
.heatmap-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:5px}
.hm-dot{
  aspect-ratio:1;
  border-radius:3px;
  background:var(--border-subtle);
  cursor:pointer;
  transition:var(--transition);
  position:relative;
}
.hm-dot:hover{transform:scale(1.2)}
.hm-dot.toefl.done{background:var(--indigo);box-shadow:0 0 6px rgba(129,140,248,0.5)}
.hm-dot.ml.done{background:var(--emerald);box-shadow:0 0 6px rgba(52,211,153,0.4)}
.hm-dot.review.done{background:var(--amber);box-shadow:0 0 6px rgba(252,211,77,0.4)}
.hm-dot.toefl:not(.done){background:rgba(129,140,248,0.12)}
.hm-dot.ml:not(.done){background:rgba(52,211,153,0.08)}
.hm-dot.review:not(.done){background:rgba(252,211,77,0.08)}

/* Category legend */
.legend{display:flex;flex-direction:column;gap:8px}
.legend-item{display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 8px;border-radius:var(--radius-sm);transition:var(--transition)}
.legend-item:hover{background:var(--bg-elevated)}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-item span{font-size:12px;color:var(--text-secondary)}
.legend-item .legend-count{margin-left:auto;font-size:11px;font-family:var(--font-mono);color:var(--text-tertiary)}

/* Week nav */
.week-nav{display:flex;flex-direction:column;gap:4px}
.week-nav-btn{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;border-radius:var(--radius-sm);
  background:transparent;border:none;color:var(--text-secondary);
  font-family:var(--font-sans);font-size:12px;font-weight:500;
  cursor:pointer;transition:var(--transition);text-align:left;
  width:100%;
}
.week-nav-btn:hover{background:var(--bg-elevated);color:var(--text-primary)}
.week-nav-btn.active{background:rgba(99,102,241,0.12);color:var(--indigo);border-left:2px solid var(--indigo);padding-left:8px}
.week-nav-btn .wk-num{font-size:10px;font-family:var(--font-mono);color:var(--text-tertiary);min-width:20px}
.week-nav-btn.active .wk-num{color:var(--indigo)}
.week-nav-btn .wk-prog{margin-left:auto;font-size:10px;font-family:var(--font-mono);color:var(--text-tertiary)}

/* ─── MAIN ────────────────────────────────────────────────────── */
.main{flex:1;min-width:0;padding:32px 28px 60px;display:flex;flex-direction:column;gap:24px}

/* Controls */
.controls{
  position:sticky;top:0;z-index:100;
  background:rgba(10,14,26,0.92);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border-subtle);
  margin:-32px -28px 0;
  padding:16px 28px;
  display:flex;flex-wrap:wrap;gap:10px;align-items:center;
}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-tertiary);pointer-events:none;font-size:14px}
.search-input{
  width:100%;background:var(--bg-input);
  border:1px solid var(--border-subtle);border-radius:var(--radius-md);
  color:var(--text-primary);font-family:var(--font-sans);font-size:13px;
  padding:8px 12px 8px 34px;outline:none;transition:var(--transition);
}
.search-input::placeholder{color:var(--text-tertiary)}
.search-input:focus{border-color:var(--indigo);box-shadow:0 0 0 3px rgba(129,140,248,0.1)}
.filter-group{display:flex;gap:4px;flex-wrap:wrap}
.filter-btn{
  padding:6px 12px;border-radius:var(--radius-md);border:1px solid var(--border-subtle);
  background:transparent;color:var(--text-secondary);font-family:var(--font-sans);font-size:12px;font-weight:500;
  cursor:pointer;transition:var(--transition);white-space:nowrap;
}
.filter-btn:hover{border-color:var(--border-mid);color:var(--text-primary)}
.filter-btn.active{background:rgba(129,140,248,0.12);border-color:var(--indigo);color:var(--indigo)}
.filter-btn.f-toefl.active{background:rgba(129,140,248,0.12);border-color:var(--indigo);color:var(--indigo)}
.filter-btn.f-ml.active{background:rgba(52,211,153,0.1);border-color:var(--emerald);color:var(--emerald)}
.filter-btn.f-review.active{background:rgba(252,211,77,0.1);border-color:var(--amber);color:var(--amber)}
.filter-btn.f-done.active{background:rgba(99,102,241,0.08);border-color:var(--indigo);color:var(--indigo)}
.filter-btn.f-pending.active{background:rgba(74,90,122,0.2);border-color:var(--border-mid);color:var(--text-primary)}

/* Week header */
.week-header{
  display:flex;align-items:center;gap:14px;
  padding-top:8px;
}
.week-header-num{
  font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text-tertiary);font-family:var(--font-mono);
}
.week-header-title{font-size:17px;font-weight:600;color:var(--text-primary)}
.week-header-line{flex:1;height:1px;background:var(--border-subtle)}
.week-header-count{font-size:11px;color:var(--text-tertiary);font-family:var(--font-mono);white-space:nowrap}

/* Days grid */
.days-list{display:flex;flex-direction:column;gap:8px}

/* Day card */
.day-card{
  background:var(--bg-card);
  border:1px solid var(--border-subtle);
  border-radius:var(--radius-lg);
  overflow:hidden;
  transition:border-color 0.2s,box-shadow 0.2s;
  position:relative;
}
.day-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  border-radius:3px 0 0 3px;
  transition:opacity 0.2s;
  opacity:0.7;
}
.day-card.toefl::before{background:var(--indigo)}
.day-card.ml::before{background:var(--emerald)}
.day-card.review::before{background:var(--amber)}
.day-card:hover{border-color:var(--border-mid)}
.day-card.toefl:hover,.day-card.toefl.expanded{border-color:var(--indigo-border);box-shadow:0 0 0 1px rgba(129,140,248,0.1),0 4px 20px rgba(99,102,241,0.08)}
.day-card.ml:hover,.day-card.ml.expanded{border-color:var(--emerald-border);box-shadow:0 0 0 1px rgba(52,211,153,0.08),0 4px 20px rgba(16,185,129,0.06)}
.day-card.review:hover,.day-card.review.expanded{border-color:var(--amber-border);box-shadow:0 0 0 1px rgba(252,211,77,0.08),0 4px 20px rgba(245,158,11,0.06)}
.day-card.done-card{opacity:0.7}
.day-card.hidden{display:none}

/* Card header */
.card-top{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px 14px 20px;
  cursor:pointer;user-select:none;
}
.day-num-badge{
  font-size:10px;font-weight:700;font-family:var(--font-mono);
  color:var(--text-tertiary);min-width:32px;
}
.type-badge{
  font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;
  letter-spacing:.04em;white-space:nowrap;flex-shrink:0;
}
.toefl .type-badge{background:rgba(129,140,248,0.12);color:var(--indigo);border:1px solid rgba(129,140,248,0.2)}
.ml .type-badge{background:rgba(52,211,153,0.1);color:var(--emerald);border:1px solid rgba(52,211,153,0.2)}
.review .type-badge{background:rgba(252,211,77,0.1);color:var(--amber);border:1px solid rgba(252,211,77,0.2)}
.card-title{font-size:13px;font-weight:500;color:var(--text-primary);flex:1;line-height:1.4}
.card-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.check-btn{
  width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border-mid);
  background:transparent;cursor:pointer;transition:var(--transition);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.check-btn:hover{border-color:var(--indigo)}
.day-card.done-card .check-btn{background:var(--indigo);border-color:var(--indigo)}
.check-btn svg{display:none;width:11px;height:11px;color:white}
.day-card.done-card .check-btn svg{display:block}
.chevron{color:var(--text-tertiary);transition:transform 0.25s cubic-bezier(0.4,0,0.2,1);width:14px;height:14px;flex-shrink:0}
.day-card.expanded .chevron{transform:rotate(180deg)}

/* Card body */
.card-body{
  max-height:0;overflow:hidden;
  transition:max-height 0.4s cubic-bezier(0.4,0,0.2,1),opacity 0.3s;
  opacity:0;
}
.day-card.expanded .card-body{max-height:1200px;opacity:1}
.card-body-inner{
  padding:0 20px 20px 20px;
  border-top:1px solid var(--border-subtle);
}
.focus-row{
  display:flex;align-items:center;gap:6px;
  padding:10px 0 14px;
}
.focus-icon{font-size:12px;color:var(--text-tertiary)}
.focus-text{font-size:12px;color:var(--text-secondary);font-weight:500}

/* Theory block */
.teoria-block{
  background:var(--bg-input);
  border:1px solid var(--border-subtle);
  border-radius:var(--radius-md);
  padding:14px 16px;
  margin-bottom:14px;
}
.block-label{
  font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text-tertiary);margin-bottom:10px;display:flex;align-items:center;gap:6px;
}
.block-label::after{content:'';flex:1;height:1px;background:var(--border-subtle)}
.teoria-text{
  font-family:var(--font-mono);font-size:11.5px;
  color:var(--text-secondary);line-height:1.75;white-space:pre-wrap;
  word-break:break-word;
}

/* Search tags */
.search-block{margin-bottom:14px}
.tags-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.search-tag{
  display:inline-flex;align-items:center;
  font-size:11px;font-family:var(--font-mono);
  background:var(--bg-elevated);border:1px solid var(--border-subtle);
  border-radius:20px;padding:4px 10px;color:var(--text-tertiary);
  transition:var(--transition);cursor:default;
}
.search-tag:hover{border-color:var(--border-mid);color:var(--text-secondary)}

/* Dual value boxes */
.dual-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
.dual-box{
  background:var(--bg-elevated);border-radius:var(--radius-md);
  padding:12px 14px;border:1px solid var(--border-subtle);
}
.dual-label{
  font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  margin-bottom:6px;
}
.dual-box.toefl-box .dual-label{color:var(--indigo)}
.dual-box.ml-box .dual-label{color:var(--emerald)}
.dual-text{font-size:12px;color:var(--text-secondary);line-height:1.6}

/* No results */
.no-results{
  text-align:center;padding:60px 20px;
  color:var(--text-tertiary);font-size:14px;
}
.no-results .nr-icon{font-size:36px;margin-bottom:12px;opacity:0.5}

/* ─── MOBILE NAV ──────────────────────────────────────────────── */
.mobile-header{display:none}
.mobile-week-scroll{display:none}

/* ─── SCROLLBAR ───────────────────────────────────────────────── */
.main::-webkit-scrollbar{width:0}

/* ─── ANIMATIONS ──────────────────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.day-card{animation:fadeUp 0.25s ease both}
.day-card:nth-child(2){animation-delay:.03s}
.day-card:nth-child(3){animation-delay:.06s}
.day-card:nth-child(4){animation-delay:.09s}
.day-card:nth-child(5){animation-delay:.12s}
.day-card:nth-child(6){animation-delay:.15s}
.day-card:nth-child(7){animation-delay:.18s}

/* ─── RESPONSIVE ──────────────────────────────────────────────── */
@media(max-width:900px){
  .sidebar{display:none}
  .mobile-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 16px 10px;
    background:var(--bg-card);
    border-bottom:1px solid var(--border-subtle);
    position:sticky;top:0;z-index:200;
  }
  .mobile-header .brand-title{font-size:14px}
  .mobile-header .brand-sub{font-size:10px;color:var(--text-tertiary)}
  .mobile-ring{display:flex;align-items:center;gap:8px}
  .mobile-pct{font-size:13px;font-weight:700;color:var(--indigo)}
  .mobile-week-scroll{
    display:flex;gap:6px;overflow-x:auto;
    padding:10px 16px;
    background:var(--bg-card);
    border-bottom:1px solid var(--border-subtle);
    scrollbar-width:none;
  }
  .mobile-week-scroll::-webkit-scrollbar{display:none}
  .mobile-week-scroll .week-nav-btn{
    white-space:nowrap;flex-shrink:0;
    border:1px solid var(--border-subtle);border-radius:var(--radius-md);
    padding:5px 10px;
  }
  .mobile-week-scroll .week-nav-btn.active{
    background:rgba(129,140,248,0.12);border-color:var(--indigo);
    border-left:1px solid var(--indigo);padding-left:10px;
  }
  .app-shell{flex-direction:column}
  .main{padding:12px 12px 60px}
  .controls{margin:-12px -12px 0;padding:10px 12px}
  .dual-grid{grid-template-columns:1fr}
}
@media(max-width:520px){
  .filter-group{gap:3px}
  .filter-btn{padding:5px 9px;font-size:11px}
  .card-title{font-size:12px}
}
</style>
</head>
<body>
<!-- Mobile header -->
<div class="mobile-header">
  <div>
    <div class="brand-title">45-Day Study Plan</div>
    <div class="brand-sub">TOEFL ITP + ML Engineering</div>
  </div>
  <div class="mobile-ring">
    <svg width="36" height="36" viewBox="0 0 36 36">
      <defs><linearGradient id="mgr" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#818CF8"/><stop offset="100%" stop-color="#34D399"/></linearGradient></defs>
      <circle cx="18" cy="18" r="14" fill="none" stroke="#1e2a42" stroke-width="5"/>
      <circle id="mobile-ring-fill" cx="18" cy="18" r="14" fill="none" stroke="url(#mgr)" stroke-width="5" stroke-linecap="round" stroke-dasharray="87.96" stroke-dashoffset="87.96" transform="rotate(-90 18 18)"/>
    </svg>
    <span class="mobile-pct" id="mobile-pct">0%</span>
  </div>
</div>
<div class="mobile-week-scroll" id="mobile-week-nav"></div>

<div class="app-shell">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-label">Study Dashboard</div>
      <div class="brand-title">Programa Intensivo C1</div>
      <div class="brand-sub">TOEFL ITP · ML Engineering · 45 días · 1h diaria</div>
    </div>

    <!-- Progress ring -->
    <div class="prog-section">
      <div class="prog-ring-wrap">
        <svg width="120" height="120" viewBox="0 0 120 120">
          <defs>
            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#818CF8"/>
              <stop offset="100%" stop-color="#34D399"/>
            </linearGradient>
          </defs>
          <circle class="ring-track" cx="60" cy="60" r="50"/>
          <circle class="ring-fill" id="ring-fill" cx="60" cy="60" r="50"
            stroke-dasharray="314.16" stroke-dashoffset="314.16"/>
        </svg>
        <div class="ring-label">
          <div class="ring-pct" id="ring-pct">0%</div>
          <div class="ring-days" id="ring-days">0 / 45 días</div>
        </div>
      </div>
      <div class="prog-detail">
        <div class="prog-count"><span id="done-count">0</span> días completados</div>
        <div class="prog-sub" id="streak-text">Comienza marcando tu primer día ✓</div>
      </div>
    </div>

    <!-- Heatmap -->
    <div class="heatmap-section">
      <div class="section-label">Mapa de progreso — 45 días</div>
      <div class="heatmap-grid" id="heatmap"></div>
    </div>

    <!-- Legend -->
    <div>
      <div class="section-label">Categorías</div>
      <div class="legend">
        <div class="legend-item" data-filter="toefl" onclick="applyFilter('toefl',this)">
          <div class="legend-dot" style="background:var(--indigo)"></div>
          <span>TOEFL ITP</span>
          <span class="legend-count" id="cnt-toefl">0/0</span>
        </div>
        <div class="legend-item" data-filter="ml" onclick="applyFilter('ml',this)">
          <div class="legend-dot" style="background:var(--emerald)"></div>
          <span>ML Engineering</span>
          <span class="legend-count" id="cnt-ml">0/0</span>
        </div>
        <div class="legend-item" data-filter="review" onclick="applyFilter('review',this)">
          <div class="legend-dot" style="background:var(--amber)"></div>
          <span>Review / Mock</span>
          <span class="legend-count" id="cnt-review">0/0</span>
        </div>
      </div>
    </div>

    <!-- Week nav -->
    <div>
      <div class="section-label">Semanas</div>
      <div class="week-nav" id="sidebar-week-nav"></div>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main" id="main">
    <!-- Sticky controls -->

{n:1,type:"toefl",title:"TOEFL Structure: Parallel Structures & Subject-Verb Agreement Traps",focus:"TOEFL ITP — Structure & Written Expression",teoria:`PARALLEL STRUCTURE RULE: All elements in a series must share the same grammatical form.\n• Correct: "The model was trained, evaluated, AND deployed."\n• Trap: "The model was trained, in evaluation, AND deploying." → ERROR\n\nSVA INVERSION TRAPS:\n• "Neither X nor Y [verb agrees with Y]"\n• "There + BE + [subject]" → verb follows subject, not 'there'\n• Prepositional phrase between S and V hides the real subject\n\nKEY PATTERN: "Each of the / One of the / Every + [plural noun] + [singular verb]"`,search:`"TOEFL ITP Structure Section traps parallel structure" | "TOEFL written expression parallel form tricks"`,toefl:"Las preguntas de Written Expression testean estas trampas en >30% de los ítems. Dominarlas en 3-4 segundos cada una es la diferencia entre banda 50 y 60.",ml:"En una entrevista cuando describes un pipeline: 'The system ingests, preprocesses, and trains' — la paralelismo correcto proyecta articulación técnica precisa."},
{n:2,type:"toefl",title:"TOEFL Reading: Inference & Author's Purpose in Scientific Passages",focus:"TOEFL ITP — Reading Comprehension",teoria:`INFERENCE QUESTION STEMS (reconócelos al instante):\n• "It can be inferred that..."\n• "The author implies that..."\n• "Which of the following is most likely true?"\n\nESTRATEGIA 3-STEP:\n1. Localiza el párrafo de evidencia (keyword scan)\n2. Parafrasea la idea central del párrafo\n3. Elimina: demasiado extremo (always/never), fuera de scope, factualmente inverso\n\nDISTRACTOR TIPOS:\n• True but not stated in passage\n• Partially correct (right word, wrong context)\n• Opposite of what's stated`,search:`"TOEFL ITP reading inference questions academic passage strategy" | "TOEFL reading comprehension eliminate wrong answers"`,toefl:"El 40% de Reading son inference/implication questions. Reconocer los 4 tipos de distractor es más rápido que re-leer el pasaje.",ml:"Leer papers de ML con esta lógica (¿qué implican los resultados?) te prepara para discutir contribuciones de investigación en entrevistas con rigor."},
{n:3,type:"ml",title:"The STAR Method for ML Behavioral Questions",focus:"ML Engineering — Interview Prep / Behavioral",teoria:`STAR FRAMEWORK para ML:\nS — Situation: "We had a production model with 72h retraining cycles..."\nT — Task: "I needed to reduce latency without sacrificing >1% AUC."\nA — Action: [MOST IMPORTANT — be specific and technical]\n  → Name the algorithm/technique\n  → Quantify your decision criteria\n  → Mention what you tested vs. what you deployed\nR — Result: Quantify. Always. ("Reduced to 4h retraining, AUC delta < 0.3%")\n\nCOMMON ML BEHAVIORAL QUESTIONS:\n• "Tell me about a model that failed in production."\n• "Describe a time you disagreed with your team's technical choice."\n• "How did you handle a dataset with severe class imbalance?"`,search:`"STAR method ML engineer behavioral interview examples" | "machine learning behavioral questions technical answers"`,toefl:"Este framework también te entrena a estructurar ideas causalmente — exactamente la lógica que el Reading de TOEFL testea en pasajes de ciencia.",ml:"STAR es el formato estándar esperado en entrevistas de empresas tech internacionales. Memorizar 5 historias STAR sobre tus proyectos ML cubre el 80% de preguntas behavioral."},
{n:4,type:"toefl",title:"TOEFL Listening: Lecture Comprehension & Note-Taking System",focus:"TOEFL ITP — Listening Comprehension",teoria:`SISTEMA DE NOTAS PARA LECTURES (adaptar al ITP):\nUsa símbolos consistentes:\n→ causa/efecto  | ≠ contraste  | * punto clave  | ? inferir  | ↑↓ tendencia\n\nESTRUCTURA TÍPICA DE LECTURE ITP:\n• Topic + Background (1er párrafo)\n• Main argument/finding\n• Supporting evidence x2\n• Counterargument OR limitation\n• Conclusion\n\nTRAMPAS DE AUDIO:\n• "Not" en pregunta = la respuesta es lo OPUESTO de lo que oíste\n• Paraphrasing: la respuesta correcta rara vez usa las palabras exactas del audio\n• Distractors en conversaciones: el estudiante menciona opción incorrecta primero`,search:`"TOEFL ITP Listening Section strategies academic lecture" | "TOEFL listening note taking system shortcuts"`,toefl:"El Listening ITP tiene 50 preguntas en 35 min. Tu sistema de símbolos debe ser automático para procesar a esa velocidad.",ml:"Escuchar presentaciones técnicas de ML (NeurIPS talks, MLOps podcasts) con este sistema entrena tu comprensión de vocabulario especializado en contexto real."},
{n:5,type:"toefl",title:"TOEFL Structure: Relative Clauses & Reduced Relative Clauses",focus:"TOEFL ITP — Structure & Written Expression",teoria:`RELATIVE CLAUSE vs. REDUCED:\nFull: "The dataset [that was] labeled by experts performed best."\nReduced: "The dataset labeled by experts performed best." ← PREFERRED in academic writing\n\nTRAMPAS CLAVE:\n1. Missing relative pronoun: "The paper *__ was published in Nature* became a benchmark." → necesita 'that'\n2. Which vs. That: 'which' = non-restrictive (coma), 'that' = restrictive (sin coma)\n3. Dangling participial: "Having been trained on ImageNet, *the researchers* evaluated..." → ERROR (researchers ≠ trained)\n\nPRACTICE PATTERN:\n"A transformer model [that/which] uses self-attention [has/have] revolutionized NLP."`,search:`"TOEFL ITP relative clauses written expression traps" | "reduced relative clause academic English exercises"`,toefl:"Las relative clauses aparecen en al menos 5-7 ítems por examen en Structure. El dangling modifier es el error más frecuente en Written Expression.",ml:"En system design interviews, articular: 'The architecture, which relies on attention mechanisms, scales linearly' — el uso preciso de which/that demuestra escritura técnica C1."},
{n:6,type:"ml",title:"Explaining Model Architectures Clearly — The 'Explain to a PM' Framework",focus:"ML Engineering — Technical Communication",teoria:`FRAMEWORK: Concept → Analogy → Technical Detail → Trade-off\n\nEJEMPLO — Transformers:\nConcept: "A Transformer processes all tokens in parallel using attention."\nAnalogy: "Unlike an RNN that reads word-by-word like a person, a Transformer reads the whole sentence at once, like a speed-reader seeing all words simultaneously."\nTechnical: "Self-attention computes Q·K^T/√d_k softmax scores to weight value vectors."\nTrade-off: "Quadratic complexity in sequence length — O(n²) — makes it expensive for very long sequences. Hence sparse attention variants like Longformer."\n\nPRACTICA CON:\n• CNNs vs. ViTs\n• LSTM vs. Transformer\n• XGBoost vs. Neural Net for tabular data`,search:`"explain transformer architecture interview ML engineer" | "machine learning system design explanation clarity"`,toefl:"Articular estructuras complejas con este patrón es idéntico a cómo las preguntas de Reading de TOEFL testean la comprensión de estructura de argumento científico.",ml:"Los entrevistadores evalúan si puedes comunicar claramente a stakeholders no técnicos. Este framework te posiciona como Senior, no solo como implementador."},
{n:7,type:"review",title:"Mini-Mock + Vocabulary Consolidation Week 1",focus:"Review — TOEFL ITP + ML",teoria:`REVISIÓN SEMANA 1:\n\nVOCABULARIO ACADÉMICO CLAVE (memorizar definición + uso técnico):\n• empirical — based on data/observation: "empirical evaluation of the baseline"\n• robust — performing well across conditions: "a robust model generalizes"\n• magnitude — scale/size: "the magnitude of the error"\n• converge — reach a stable state: "the loss converges after epoch 40"\n• latent — hidden/underlying: "latent space representation"\n• sparse — mostly zero/empty: "sparse feature vectors"\n• canonical — standard/authoritative: "the canonical implementation"\n\nMINI-MOCK TASK:\n• 10 Structure items (tiempo: 8 min)\n• 1 Reading passage (tiempo: 10 min)\n• Escucha 1 lecture ITP real (YouTube) y toma notas con tu sistema`,search:`"TOEFL ITP practice test free Structure Reading" | "academic word list TOEFL technical vocabulary quiz"`,toefl:"La revisión activa de vocabulario en contexto técnico es lo que convierte palabras pasivas en respuestas instintivas en el examen.",ml:"Este vocabulario académico es exactamente lo que usas al leer y discutir papers de ML — 'empirical results show', 'robust to distribution shift', 'latent representations'."}
]},

{n:8,type:"toefl",title:"TOEFL Structure: Noun Clauses as Subjects & Objects",focus:"TOEFL ITP — Structure & Written Expression",teoria:`NOUN CLAUSES — PATRONES CLAVE:\n\nAs Subject: "[What the model predicts] determines the loss function."\nAs Object: "Researchers found [that attention weights are interpretable]."\nAs Complement: "The issue is [whether the data is balanced]."\n\nTRAMPAS:\n1. "That" vs. "What": \n   • "That" → introduces a complete statement (known fact)\n   • "What" → introduces unknown/question element\n   • ERROR: "What the study found *that* results improved." → debe ser 'was that'\n\n2. Embedded question order: MUST be declarative\n   • WRONG: "We don't know *what is the optimal learning rate.*"\n   • RIGHT: "We don't know *what the optimal learning rate is.*"`,search:`"TOEFL ITP noun clauses structure section examples" | "embedded questions word order TOEFL written expression"`,toefl:"Noun clauses son responsables de ~15% de errores en Structure. La inversión de orden en embedded questions es una trampa casi segura en cada examen.",ml:"'What the benchmark reveals is that our model underperforms on tail classes' — esta estructura eleva tu registro en entrevistas y en documentación técnica."},
{n:9,type:"toefl",title:"TOEFL Reading: Vocabulary-in-Context & Reference Questions",focus:"TOEFL ITP — Reading Comprehension",teoria:`VOCABULARY-IN-CONTEXT STRATEGY:\n1. Cover the options — parafrasea la palabra tú mismo\n2. Substituye cada opción en la oración COMPLETA\n3. La respuesta debe mantener el significado, no solo ser sinónimo aislado\n\nREFERENCE QUESTIONS ("The word 'it/they/this' in line X refers to..."):\n• Regla: el pronombre refiere al ANTECEDENTE GRAMATICAL MÁS CERCANO compatible en número/género\n• Trampa frecuente: el antecedente lógico ≠ antecedente gramatical\n• Método: sustituye el pronombre por cada opción y verifica coherencia semántica Y gramatical\n\nACADEMIC WORD FAMILIES (aprender en familia):\nnote → notable / notably / notation\nassume → assumption / assumed / presuppose\nestablish → established / establishment / well-established`,search:`"TOEFL ITP reading vocabulary in context strategy" | "TOEFL pronoun reference questions technique"`,toefl:"Vocabulary-in-context + reference questions = ~35% del total de Reading. Son las preguntas más rápidas de responder si dominas el método.",ml:"Leer papers de ML con este enfoque (¿a qué refiere 'this approach'?) desarrolla comprensión profunda de argumentación técnica."},
{n:10,type:"ml",title:"Data Pipeline Design: ETL, Feature Stores & Data Quality",focus:"ML Engineering — System Design",teoria:`FRAMEWORK PARA EXPLICAR UN ML PIPELINE EN ENTREVISTA:\n\n1. DATA INGESTION: "We ingest from [source] via [method] — batch/streaming"\n2. PREPROCESSING: "Normalization strategy: StandardScaler for continuous, target encoding for high-cardinality categoricals"\n3. FEATURE ENGINEERING: "We use a Feature Store (Feast/Tecton) to avoid training-serving skew"\n4. VALIDATION: "Great Expectations for schema validation; monitor KL divergence for distribution shift"\n5. STORAGE: "Parquet on S3 for training; Redis for low-latency serving features"\n\nKEY TRADE-OFF VOCABULARY:\n• "batch vs. real-time trade-off": latency vs. throughput\n• "training-serving skew": when offline features ≠ online features\n• "data leakage": future information contaminating training set`,search:`"ML data pipeline design interview system design" | "feature store training serving skew explanation"`,toefl:"Articular trade-offs con vocabulario técnico preciso también mejora tu lectura de pasajes científicos del TOEFL, que usan el mismo patrón de argumento/counterargument.",ml:"El diseño de pipelines es preguntado en el 80% de entrevistas Senior MLE. Dominar el vocabulario y el framework posiciona tu respuesta a nivel Staff."},
{n:11,type:"toefl",title:"TOEFL Structure: Conditional Sentences & Hypothetical Structures",focus:"TOEFL ITP — Structure & Written Expression",teoria:`4 CONDITIONAL TYPES — ACADEMIC USAGE:\n\nType 0 (fact): "If data is skewed, the model overfits." [present + present]\nType 1 (real future): "If we regularize, performance will improve."\nType 2 (hypothetical): "If we had more data, the model would generalize better."\nType 3 (past counterfactual): "If we had used cross-validation, we would have detected overfitting."\n\nTRAMPAS ITP:\n1. "Would" NEVER goes in the if-clause\n   WRONG: "If the model *would converge*, results would improve."\n2. Inverted conditionals (formal/academic):\n   "Were the dataset larger, accuracy would increase." (= If the dataset were larger)\n   "Had we applied dropout, overfitting would have been reduced."\n\nEste último patrón aparece frecuentemente en pasajes académicos TOEFL.`,search:`"TOEFL ITP conditional sentences structure written expression" | "inverted conditionals academic English examples"`,toefl:"Las inversiones condicionales (Were/Had/Should) aparecen en al menos 2-3 ítems por examen y confunden a la mayoría de candidatos.",ml:"'Had we deployed the model earlier, we would have captured the Q4 trend' — los counterfactuals en entrevistas demuestran pensamiento analítico retrospectivo sofisticado."},
{n:12,type:"toefl",title:"TOEFL Listening: Conversation Comprehension & Attitude Questions",focus:"TOEFL ITP — Listening Comprehension",teoria:`CONVERSATION STRUCTURE ITP:\n• Typical scenario: student-professor, student-administrator, two students\n• Focus: purpose of conversation, problem/solution, speaker's attitude\n\nATTITUDE QUESTION SIGNALS (en el audio):\n• Hesitation words: "well...", "actually...", "I'm not sure but..." → doubt/uncertainty\n• Tone rise at end → question/uncertainty\n• "That's interesting" (said flatly) → often sarcasm or polite skepticism\n• Repetition of key info → emphasis, important point\n\nANSWER TRAP: "The student thinks the assignment is _____"\n• Distractor: uses a positive word but the speaker's tone was negative\n• Strategy: focus on HOW something is said, not just WHAT`,search:`"TOEFL ITP listening conversations attitude inference" | "TOEFL listening section Part A short conversations tips"`,toefl:"Las preguntas de actitud e inferencia emocional del Listening son un 20% del total. Entrenar la lectura de tono paralelo al contenido las hace triviales.",ml:"En entrevistas, escuchar el tono del entrevistador (¿están satisfechos con tu respuesta?) para calibrar si elaborar o continuar es una habilidad de comunicación Senior."},
{n:13,type:"ml",title:"Evaluation Metrics Deep Dive: Beyond Accuracy",focus:"ML Engineering — Technical Vocabulary / Interview Prep",teoria:`FRAMEWORK METRICS → USE CASE → TRADE-OFF:\n\nClassification:\n• Precision = TP/(TP+FP) → "When you say positive, how often are you right?"\n• Recall = TP/(TP+FN) → "Of all actual positives, how many did you catch?"\n• F1 = harmonic mean → balance when classes are imbalanced\n• AUC-ROC → rank ordering, threshold-independent\n• PR-AUC → preferred when positive class is rare (fraud, medical)\n\nRegression:\n• MAE → interpretable, robust to outliers\n• RMSE → penalizes large errors more (use when large errors are costly)\n• MAPE → percentage error (avoid when actuals can be 0)\n\nRanking/Recommendation:\n• NDCG → normalized discounted cumulative gain\n• MAP → mean average precision\n\nKEY INTERVIEW ANSWER: "The metric choice is driven by the business cost of each error type."`,search:`"ML evaluation metrics interview deep dive precision recall AUC" | "when to use NDCG vs MAP recommendation systems"`,toefl:"Entender la relación entre variables cuantitativas (precision vs recall) usa el mismo razonamiento lógico que las preguntas de causa/efecto en el Reading ITP.",ml:"Los entrevistadores valoran que menciones el costo de negocio asociado a cada tipo de error. Esto diferencia un MLE Senior de un Junior."},
{n:14,type:"review",title:"Mini-Mock + Week 2 Structure Patterns Review",focus:"Review — TOEFL ITP Structure Focus",teoria:`CHECKLIST STRUCTURE WEEK 1-2 (repasar antes del mock):\n☐ Parallel structures (A, B, and C — same form)\n☐ Subject-verb agreement with intervening phrases\n☐ Each/one of the + plural noun + singular verb\n☐ Relative clauses: which vs. that + dangling modifiers\n☐ Noun clauses: that vs. what + embedded question order\n☐ Conditionals: would never in if-clause + inverted form\n\nMINI-MOCK WEEK 2:\n• 20 Structure items (tiempo: 15 min)\n• 1 Full Reading passage with all question types (tiempo: 12 min)\n• Corrección analítica: para cada error, identifica CUÁL trampa activaste`,search:`"TOEFL ITP free practice test structure written expression" | "TOEFL ITP full practice test PDF 2023 2024"`,toefl:"El análisis de errores es el 80% del progreso. No es cuántos mocks haces, sino cuán profundo analizas cada fallo.",ml:"El habit de post-mortem analítico (¿qué falló y por qué?) es también el mindset de un MLE Senior ante un modelo en producción."}
]},
{title:"Semana 3 — Días 15–21: Reading Avanzado + ML Algorithms",days:[
{n:15,type:"toefl",title:"TOEFL Reading: Main Idea & Organization of Scientific Passages",focus:"TOEFL ITP — Reading Comprehension",teoria:`MAIN IDEA STRATEGY (30 segundos):\n1. Lee el primer párrafo COMPLETO\n2. Lee la primera oración de cada párrafo siguiente\n3. Lee el último párrafo completo\n→ Tienes el esqueleto del argumento sin leer el 60% del texto\n\nPASSAGE ORGANIZATION TYPES:\n• Problem-Solution: [challenge] → [proposed approach] → [results]\n• Comparison-Contrast: [method A] vs. [method B] → [conclusion]\n• Cause-Effect: [phenomenon] → [mechanism] → [consequence]\n• Chronological: [historical development of concept]\n\nQUESTION MAPPING:\n"The passage is primarily concerned with..." → Main Idea\n"According to the passage, X occurs because..." → Cause-Effect\n"The author's attitude toward X is best described as..." → Tone`,search:`"TOEFL ITP reading main idea passage structure strategy" | "academic reading comprehension skimming technique TOEFL"`,toefl:"Dominar el skim strategy reduce el tiempo de lectura en 40% sin afectar precisión — crítico en el ITP donde los pasajes son densos.",ml:"Los papers de ML siguen la estructura Problem-Solution-Results. Leerlos con este framework es un multiplicador de comprensión para el upskilling técnico continuo."},
{n:16,type:"toefl",title:"TOEFL Structure: Gerunds vs. Infinitives & Verb Complementation",focus:"TOEFL ITP — Structure & Written Expression",teoria:`GERUND vs. INFINITIVE — REGLAS PARA EXAMEN:\n\nVerbs that take GERUND only:\n• avoid, consider, deny, finish, practice, suggest, recommend\n• "The team avoided *overfitting* by applying dropout."\n\nVerbs that take INFINITIVE only:\n• agree, decide, plan, refuse, seem, tend, hope, expect\n• "The model tends *to underperform* on out-of-distribution data."\n\nVerbs that take BOTH (meaning changes!):\n• stop + gerund = quit doing\n  "The training stopped converging." (training que antes convergía dejó de hacerlo)\n• stop + infinitive = pause to do\n  "Training stopped to resume with a lower LR." (paró PARA hacer algo)\n• remember/forget: gerund = past event; infinitive = future task\n\nTRAMPA FRECUENTE: after prepositions, ALWAYS gerund\n"Before *deploying*, we validate." ← correcto`,search:`"TOEFL gerund infinitive written expression traps" | "gerund vs infinitive meaning change stop remember"`,toefl:"Gerund/infinitive discrimination aparece en 3-5 ítems por examen. Los verbos de doble significado son trampas perfectas para candidatos avanzados.",ml:"'We recommend evaluating on a held-out set' vs. 'We plan to evaluate' — el uso preciso señala dominio del idioma ante un equipo nativo."},
{n:17,type:"ml",title:"Algorithm Trade-offs: The Decision Framework for MLE Interviews",focus:"ML Engineering — Technical Vocabulary / Interview Prep",teoria:`DECISION MATRIX — CÓMO ELEGIR UN ALGORITMO:\n\nTabular data:\n• < 1M rows, mixed types → XGBoost / LightGBM (start here)\n• Need interpretability → Logistic Regression + SHAP\n• Very high cardinality features → Neural net with embeddings\n\nText:\n• Classification, few-shot → Fine-tuned BERT family\n• Generation, summarization → GPT family / T5\n• Zero-shot, reasoning → LLM with prompting\n\nImages:\n• Classification → ResNet / EfficientNet (baseline), ViT (SOTA)\n• Detection → YOLO family (speed), DETR (accuracy)\n• Segmentation → SAM, Mask R-CNN\n\nFRAMEWORK DE RESPUESTA:\n"Given [constraints: latency/compute/data size/interpretability], I would choose [algorithm] because [3 technical reasons], with the trade-off that [limitation]."\n\nSignal words: latency-constrained, data-scarce, interpretable, scalable`,search:`"machine learning algorithm selection interview guide 2024" | "XGBoost vs neural network tabular data trade-offs"`,toefl:"Este framework de comparación estructurada es el mismo que el TOEFL testea en pasajes de ciencia que comparan dos teorías o métodos.",ml:"Responder con un framework explícito (en lugar de 'depende') te marca como Senior. Los entrevistadores buscan que navegues trade-offs, no memorices respuestas."},
{n:18,type:"toefl",title:"TOEFL Listening: Lecture on Scientific/Technical Topics",focus:"TOEFL ITP — Listening Comprehension",teoria:`SCIENTIFIC LECTURE STRUCTURE (ITP Part C):\nSegmento típico: 5-6 oraciones, pregunta de detalle + función + inferencia\n\nANÁLISIS DE SEÑALES DISCURSIVAS:\n• "In fact..." → reinforcement of previous point\n• "However..." → contrast/exception coming\n• "This suggests that..." → inference point — ANOTA\n• "For example..." → supporting detail (no es el punto principal)\n• "Interestingly..." → speaker is highlighting something unusual — importante\n• "As a result..." → effect/conclusion — ANOTA\n\nVELOCIDAD Y ACENTO:\nEl ITP usa acentos norteamericanos estándar a ~150 wpm\nPráctica con TED-Ed + Crash Course en YouTube a 1.25x → entrena velocidad`,search:`"TOEFL ITP Part C lecture listening academic science topics" | "Crash Course science lectures English listening practice"`,toefl:"La Part C del Listening (talks y lectures) es la más difícil del ITP. Reconocer marcadores discursivos elimina la necesidad de retener cada palabra.",ml:"Escuchar talks técnicas de ML (Andrej Karpathy, Yannic Kilcher) con esta atención activa construye vocabulario técnico de alto nivel."},
{n:19,type:"toefl",title:"TOEFL Reading: Detail Questions & Factual Information",focus:"TOEFL ITP — Reading Comprehension",teoria:`DETAIL QUESTIONS — MÉTODO EXACTO:\n"According to the passage..." / "The author states that..."\n\n1. Identifica la keyword en la pregunta\n2. Escanea el pasaje para esa keyword o su sinónimo\n3. Lee SOLO las 2-3 oraciones alrededor\n4. Compara con opciones: la correcta parafrasea el texto, NO lo copia textual\n\nNEGATIVE FACTUAL: "Which is NOT mentioned / EXCEPT"\n• Lee las 4 opciones\n• Confirma en el pasaje 3 de las 4 (las incorrectas)\n• La que NO puedas confirmar = respuesta correcta\n• ¡No inviertas la lógica!\n\nTRAMPA: "True but not in the passage" — la opción es correcta en el mundo real pero el texto no la menciona. Esa es una respuesta INCORRECTA en el ITP.`,search:`"TOEFL ITP reading detail questions strategy NOT EXCEPT" | "TOEFL reading factual information negative questions"`,toefl:"Detail + Negative Factual questions = ~40% del Reading. Son las más mecánicas y deberían ser las más seguras con el método correcto.",ml:"Leer documentación técnica (papers, RFCs, API docs) con este nivel de atención a distinción entre 'lo que dice el texto' vs. 'lo que yo asumo' evita errores de implementación costosos."},
{n:20,type:"ml",title:"MLOps & Production ML: Monitoring, Drift & Deployment Patterns",focus:"ML Engineering — System Design",teoria:`MLOps VOCABULARY ESENCIAL:\n\nDEPLOYMENT PATTERNS:\n• Blue-Green: two identical envs, instant switch → zero downtime\n• Canary: route 5% traffic to new model → monitor before full rollout\n• Shadow mode: new model runs in parallel, no impact → safe evaluation\n• A/B Testing: controlled experiment with statistical significance test\n\nMONITORING:\n• Data drift: input distribution shifts (PSI, KS test)\n• Concept drift: relationship X→Y changes (monitor prediction distribution)\n• Model degradation: metric decay over time (set alert thresholds)\n\nREFRESH STRATEGY:\n• Scheduled retraining (predictable data patterns)\n• Triggered retraining (drift detected above threshold)\n• Online learning (continuous update — careful with stability)\n\nKEY PHRASE: "Our monitoring strategy covers data quality, data drift, and model performance metrics with automated alerting and a defined retraining trigger."`,search:`"MLOps model monitoring drift detection interview" | "blue green canary deployment ML system design"`,toefl:"La narrativa de 'problema detectado → solución implementada → resultado medido' es el mismo arco argumentativo de los pasajes científicos del TOEFL.",ml:"MLOps es una habilidad diferenciadora para roles remotos — las empresas en WTTJ buscan MLE que puedan operar modelos end-to-end, no solo entrenarlos."},
{n:21,type:"review",title:"Full Half-Mock TOEFL ITP + ML Interview Simulation",focus:"Review — TOEFL ITP Full Section + ML Behavioral",teoria:`HALF-MOCK STRUCTURE (60 min exactos):\n\n[0-15 min] Structure & Written Expression:\n• 40 ítems ITP → target: 33+ correctos\n• Marca los que dudaste para revisión post-sesión\n\n[15-35 min] Reading Comprehension:\n• 50 ítems / 5 pasajes → target: 40+ correctos\n\n[35-50 min] Listening (grabación YouTube ITP oficial):\n• Parte A (short conv) + Parte B (long conv)\n\n[50-60 min] ML Interview Simulation:\n• Responde EN VOZ ALTA usando STAR:\n  "Tell me about a production incident with one of your models."\n\nANÁLISIS POST-MOCK:\n• Clasifica errores: trampa de vocabulario / trampa gramatical / tiempo insuficiente\n• Identifica patrón dominante de error`,search:`"TOEFL ITP complete practice test with answers" | "TOEFL ITP official Longman preparation course free"`,toefl:"Simular condiciones reales de examen — incluyendo el orden de secciones — reduce la ansiedad y mide progreso real contra el día 1.",ml:"Hablar en voz alta tu respuesta STAR identifica dónde pierdes fluidez o precisión técnica — información que leer en silencio no te da."}
]},
{title:"Semana 4 — Días 22–28: Pattern Mastery + ML Communication",days:[
{n:22,type:"toefl",title:"TOEFL Structure: Appositive Phrases & Parenthetical Insertions",focus:"TOEFL ITP — Structure & Written Expression",teoria:`APPOSITIVE PHRASES — identifica y reduce:\n\n"BERT, [a bidirectional encoder], outperforms earlier models."\n→ Remove brackets → "BERT outperforms earlier models." → Subject is BERT (singular)\n\nTRAMPA FRECUENTE:\n"The accuracy of the models, [as well as the precision], [needs/need] improvement."\n→ "As well as" ≠ AND → sujeto real = "accuracy" → singular → NEEDS\n\nOTROS FALSOS PLURALIZADORES:\n• together with / along with / in addition to / accompanied by\n• "The CEO, along with his team, [is/are] responsible." → IS\n\nPARENTHETICALS EN WRITTEN EXPRESSION:\n"The results, however, [was/were] inconclusive." → WERE (subject = results)\nEl parenthetical (however/therefore/moreover) NO cambia el sujeto.`,search:`"TOEFL ITP appositive phrase subject verb agreement trap" | "along with together with agreement TOEFL structure"`,toefl:"Este patrón de 'falso pluralizador' es una de las 5 trampas más frecuentes en Structure. Reconocerla visualmente en 2 segundos vale ~3 puntos.",ml:"'The pipeline, along with the feature store, requires careful versioning' — articular sujetos complejos con concordancia correcta marca precisión lingüística."},
{n:23,type:"ml",title:"Communicating Uncertainty & Limitations in ML — The Senior Mindset",focus:"ML Engineering — Interview Prep / Technical Vocabulary",teoria:`COMMUNICATING UNCERTAINTY (diferencia Junior vs. Senior):\n\nJunior: "The model achieves 94% accuracy."\nSenior: "The model achieves 94% accuracy on the held-out test set, which is IID with training. We have not yet evaluated on out-of-distribution scenarios, where I'd expect degradation."\n\nFRAMEWORK: Result → Condition → Caveat → Next Step\n\nKEY PHRASES PARA ENTREVISTAS:\n• "That said, there's a caveat worth mentioning..."\n• "The trade-off here is..."\n• "This works well under the assumption that..."\n• "I'd want to validate this on..."\n• "A risk I'd flag is..."\n• "The limitation of this approach is X; we mitigated it by Y."\n\nCUANDO NO SABES LA RESPUESTA:\n"I haven't implemented that specific architecture, but based on my understanding of [related concept], I'd reason that..." → Shows intellectual honesty + reasoning ability`,search:`"senior ML engineer interview communication uncertainty limitations" | "how to answer machine learning interview questions you don't know"`,toefl:"Este patrón de claim + condition + caveat es idéntico a la estructura argumental de los pasajes científicos del TOEFL ITP.",ml:"Los entrevistadores en empresas top valoran la honestidad calibrada. Decir 'I don't know but here's how I'd think about it' > bluffing con un respuesta vaga."},
{n:24,type:"toefl",title:"TOEFL Reading: Purpose of Paragraph & Rhetorical Function",focus:"TOEFL ITP — Reading Comprehension",teoria:`RHETORICAL FUNCTION QUESTIONS:\n"Why does the author mention X in paragraph 3?"\n"What is the function of the second paragraph?"\n\nFUNCTIONES RETÓRICAS COMUNES:\n• To provide an example of [claim in previous sentence]\n• To contrast with [the method/view described earlier]\n• To support the claim that [main argument]\n• To introduce a limitation of [the proposed approach]\n• To define a term used in [subsequent paragraphs]\n\nESTRATEGIA:\n1. Lee el párrafo ANTES del mencionado (contexto previo)\n2. Identifica la relación lógica: ¿agrega? ¿contrasta? ¿ilustra?\n3. Elige la opción que describe esa RELACIÓN, no el CONTENIDO\n\nTRAMPA: Opciones que describen correctamente qué DICE el párrafo pero no por qué está AHÍ`,search:`"TOEFL ITP reading rhetorical purpose paragraph function question" | "TOEFL reading comprehension why author mentions strategy"`,toefl:"Rhetorical function questions son las más difíciles del Reading ITP. Distinguir 'qué dice' de 'por qué está aquí' requiere comprensión de macroorganización.",ml:"Entender la función retórica de cada sección de un paper de ML (¿por qué los autores mencionan X en la introducción?) acelera la lectura crítica de literatura."},
{n:25,type:"toefl",title:"TOEFL Structure: Passive Voice in Academic Writing",focus:"TOEFL ITP — Structure & Written Expression",teoria:`PASSIVE VOICE — ACADEMIC USAGE:\n\nFORMACIÓN: BE (conjugado) + past participle\n• "The model was trained on 100M tokens."\n• "Results have been validated by two independent teams."\n• "The hypothesis will be tested in subsequent experiments."\n\nTRAMPAS EN WRITTEN EXPRESSION:\n1. Missing BE: "The data *collected* from 50 participants." → necesita WAS/WERE\n2. Wrong participle: "The results were *showed*" → SHOWN\n3. Passive with stative verbs: "The paper was consisted of..." → ERROR (consist no tiene voz pasiva activa en inglés)\n   Verbos SIN pasiva: consist, contain, include, resemble, lack\n\nWHEN TO USE PASSIVE IN ACADEMIC WRITING:\n• Agent unknown or unimportant\n• To emphasize the object/result\n• To maintain objectivity (scientific reports)\n• "Experiments were conducted..." — no dice quién → objectivity`,search:`"TOEFL ITP passive voice written expression errors" | "passive voice academic writing stative verbs no passive"`,toefl:"El pasivo es la voz dominante en escritura académica — los pasajes de Reading están llenos de él, y Written Expression testa sus formas incorrectas directamente.",ml:"Escribir documentación técnica, papers internos y READMEs con pasivo correcto ('The model was fine-tuned', NOT 'The model was fine-tuning') marca calidad profesional."},
{n:26,type:"ml",title:"Large Language Models in Production: RAG, Fine-tuning & Prompt Engineering",focus:"ML Engineering — Technical Vocabulary / Interview Prep",teoria:`LLM PRODUCTION DECISION TREE:\n\n[Prompt Engineering] → Try first. Zero cost, fast iteration.\n• Few-shot examples, chain-of-thought, system prompts\n• Limit: works for well-defined tasks with good base model\n\n[RAG (Retrieval-Augmented Generation)] → When:\n• Knowledge needs to be current or proprietary\n• Need source attribution\n• Architecture: Query → Embedding → Vector DB search → Context injection → LLM\n• Tools: LangChain, LlamaIndex, Chroma, Pinecone\n\n[Fine-tuning] → When:\n• Specific style/format required\n• Domain adaptation needed (medical, legal, code)\n• Methods: LoRA/QLoRA (parameter-efficient), full fine-tuning\n• Risk: catastrophic forgetting — use regularization\n\n[Pre-training] → Almost never for a single org. Use foundation models.\n\nKEY PHRASE: "I follow a cost-complexity curve: start with prompting, add RAG for knowledge grounding, fine-tune only if behavioral alignment is required."`,search:`"RAG vs fine-tuning LLM when to use interview 2024" | "LLM production system design RAG fine-tuning tradeoffs"`,toefl:"Articular una jerarquía de decisiones (primero X, luego Y si X no aplica) es el mismo patrón lógico que TOEFL testea en secuencias de causa-efecto en Reading.",ml:"LLMs son el tema más preguntado en entrevistas MLE 2024-2025. Este decision tree te da una respuesta estructurada y memorable."},
{n:27,type:"toefl",title:"TOEFL Listening: Connecting Spoken & Written Academic English",focus:"TOEFL ITP — Listening Comprehension",teoria:`SPOKEN vs. WRITTEN REGISTER — EL PUENTE:\n\nSPOKEN (ITP audio): contraction-heavy, hedge words, false starts\n• "It's kind of like... what happens when, you know, the gradient explodes."\n\nWRITTEN (ITP reading): formal, nominalizations, passive\n• "Gradient explosion occurs when the partial derivatives in the update rule diverge."\n\nNOMINALIZATIONS (habla académica oral también las usa):\n• analyze → analysis | develop → development | apply → application\n• "The *application* of attention mechanisms..." (not "applying attention")\n\nHEDGE VOCABULARY (marcan grado de certeza — importante en attitude questions):\n• Strong claim: "demonstrates", "proves", "clearly indicates"\n• Hedged claim: "suggests", "may indicate", "appears to", "tends to"\n• Weak/speculative: "might", "could possibly", "it is conceivable that"\n\nSaber el nivel de hedge = responder attitude/function questions correctamente`,search:`"academic English spoken written register differences TOEFL" | "hedging language academic vocabulary TOEFL listening"`,toefl:"Las preguntas de actitud del Listening dependen de reconocer estos marcadores de certeza. En Written Expression, usar el hedge correcto evita errores de registro.",ml:"En entrevistas, calibrar tu hedge ('this approach tends to work well when...' vs. 'this always works') comunica madurez técnica y honestidad intelectual."},
{n:28,type:"review",title:"Week 4 Review: Structure Mastery Checklist + ML Vocabulary Audit",focus:"Review — TOEFL ITP + ML Vocabulary Consolidation",teoria:`STRUCTURE MASTER CHECKLIST (semanas 1-4):\n☐ Parallel structures\n☐ SVA: Each/one of + inversion + appositive\n☐ Relative clauses: which/that + dangling modifier + reduction\n☐ Noun clauses: that/what + embedded question order\n☐ Conditionals: type 0-3 + inverted form\n☐ Gerund/infinitive: verb lists + meaning-change pairs\n☐ Passive: formation + stative verb exceptions\n☐ Appositive phrases + false pluralizers\n\nML VOCABULARY AUDIT — ¿Puedes definir y usar en oración?\n☐ training-serving skew | ☐ concept drift | ☐ data leakage\n☐ precision/recall trade-off | ☐ AUC-ROC vs. PR-AUC\n☐ LoRA / QLoRA | ☐ RAG architecture | ☐ canary deployment\n☐ feature store | ☐ counterfactual | ☐ regularization\n\nTASK: Para cada término que NO puedas usar fluidamente, escribe 2 oraciones de contexto en tu cuaderno.`,search:`"TOEFL ITP structure written expression complete rule list" | "ML engineer technical vocabulary flashcards Anki"`,toefl:"Una auditoría explícita de qué dominas y qué no es más valiosa que 2 horas de práctica sin foco. Identifica los 2-3 puntos débiles y duplica tiempo en ellos.",ml:"El vocabulario técnico preciso en inglés es un filtro en entrevistas remotas. Los entrevistadores nativos detectan inmediatamente cuando el candidato parafrasea porque no recuerda el término correcto."}
]},
{title:"Semana 5 — Días 29–35: Simulacros + Comunicación Avanzada",days:[
{n:29,type:"toefl",title:"TOEFL Structure: Article Usage & Quantifier Traps",focus:"TOEFL ITP — Structure & Written Expression",teoria:`ARTICLES — REGLAS PARA EXAMEN:\n\nTHE (definite) — cuando ambas partes saben a cuál se refiere:\n• "The transformer architecture proposed in Section 2..."\n• Second mention: "A model was trained. The model achieved 94% F1."\n• Unique items: "the loss function", "the main contribution"\n\nA/AN (indefinite) — primera mención, no específico:\n• "We propose a novel framework..." (cualquier framework, uno nuevo)\n\nZERO ARTICLE — generalizaciones, plurales, uncountable:\n• "Machine learning has transformed [Ø] computer vision."\n• "Ø Data quality is critical for [Ø] training."\n\nTRAMPAS FRECUENTES:\n• "a unique" → AN unique? NO → /juː/ = consonant sound → A unique\n• "an ML model" → yes, M = /ɛm/ starts with vowel sound\n• Generic plural: "The transformers are powerful" (wrong if general) → "Transformers are powerful"`,search:`"TOEFL ITP article usage written expression the a an zero article" | "article errors advanced English academic writing quiz"`,toefl:"Los errores de artículo representan 3-5 ítems en Written Expression. Son fáciles de ganar con reglas claras y difíciles de adivinar sin ellas.",ml:"La escritura de documentación técnica, proposals y papers sin errores de artículo es esperada a nivel Senior. 'The model' vs. 'a model' cambia el significado."},
{n:30,type:"ml",title:"System Design Interview: Designing an ML System End-to-End",focus:"ML Engineering — System Design",teoria:`FRAMEWORK: REQUIREMENTS → DATA → MODEL → SERVING → MONITORING\n\n1. REQUIREMENTS (2 min):\n   "Before I dive in, let me clarify: what's the scale? QPS? Latency budget? Offline or online?"\n\n2. DATA LAYER:\n   Sources, volume, labeling strategy, storage (data lake vs. warehouse)\n\n3. MODEL SELECTION:\n   Baseline first → iterate → justify complexity increase\n\n4. SERVING ARCHITECTURE:\n   Batch vs. real-time | REST API vs. gRPC | Edge vs. cloud\n   Latency target → determines model complexity\n\n5. MONITORING:\n   Input drift, prediction drift, business metric correlation\n\nEJEMPLO: "Design a recommendation system for a streaming platform."\n→ Two-stage: retrieval (ANN with embeddings) + ranking (LightGBM or small NN)\n→ Feature store for user history\n→ A/B test ranking models\n→ Monitor CTR, watch time, diversity metrics`,search:`"ML system design interview recommendation system end to end" | "machine learning system design interview framework 2024"`,toefl:"Estructurar una respuesta con un framework explícito (Requirements → Data → Model → ...) es la misma habilidad que organizar ideas en una respuesta de Writing del TOEFL.",ml:"El system design interview es el filtro más importante en roles MLE Senior en empresas internacionales. Este framework te da 30 minutos de estructura sólida."},
{n:31,type:"toefl",title:"TOEFL Reading: Scientific Passage Speed Reading Strategy",focus:"TOEFL ITP — Reading Comprehension",teoria:`SPEED READING PARA PASAJES CIENTÍFICOS (target: 250 wpm):\n\nPASAJES CIENTÍFICOS ITP — TEMÁTICAS COMUNES:\n• Biología/ecología, geología, astronomía, física, psicología cognitiva\n• Ciencias sociales y antropología\n• Historia de la ciencia y descubrimientos\n\nTIME BUDGET (5 pasajes en 55 min = 11 min/pasaje):\n• Skim: 90 segundos (primer párrafo + primeras oraciones)\n• Preguntas 1-2 (main idea / organization): 2 min\n• Preguntas 3-8 (detail + inference): 7 min\n• Preguntas 9-10 (vocabulary + reference): 90 segundos\n\nWORD TRIAGE — Skip & mark strategy:\nSi encuentras una palabra desconocida en una pregunta de vocabulario:\n• Usa contexto SENTENCIAL (no de párrafo)\n• Si no puedes deducirla en 15 seg → elige la opción más "neutral"\n\nMUSTANG PASSAGES (más difíciles): pasajes con mucho vocabulario técnico especializado\n→ Técnica: ancla con las cifras y nombres propios, infiere el marco general`,search:`"TOEFL ITP reading speed strategy academic science passage" | "how to read TOEFL passages faster without losing accuracy"`,toefl:"El tiempo es el principal asesino de puntuación en el Reading ITP. El sistema de time budget convierte la sesión de 55 min en 5 subsesiones de 11 min manejables.",ml:"La lectura rápida de papers (abstract + intro + resultados + conclusión en 5 min) con comprensión profunda es una competencia diferenciadora para MLE actualizados."},
{n:32,type:"toefl",title:"TOEFL Structure: Clauses of Purpose, Result & Concession",focus:"TOEFL ITP — Structure & Written Expression",teoria:`SUBORDINATING CONJUNCTIONS — CATEGORÍAS PARA EXAMEN:\n\nPURPOSE (para qué):\n• so that / in order that + [subject + can/could/may/might]\n• "The model was regularized so that it would generalize better."\n• ≠ "so that + would" cuando el sujeto es el mismo → usar "in order to + infinitive"\n\nRESULT (tanto que):\n• so + adj/adv + that: "The model was so accurate that deployment was approved."\n• such + noun phrase + that: "It was such a large dataset that preprocessing took 48 hours."\n\nCONCESSION (aunque):\n• Although / Even though / While + [complete clause]\n• Despite / In spite of + [noun phrase or gerund] — NO full clause\n  WRONG: "Despite that the data was noisy..." → Despite the noisy data / Despite noise\n• Nevertheless / However → connect independent clauses (use semicolon or new sentence)\n\nTRAMPA: "Despite of" → NO EXISTE en inglés. Siempre "Despite [noun]"`,search:`"TOEFL ITP subordinating conjunctions despite although result clause" | "concession clauses despite although difference TOEFL"`,toefl:"'Despite of' es uno de los errores más frecuentes de candidatos avanzados en Written Expression. Eliminarlo solo vale 1-2 puntos seguros.",ml:"'Although the model performs well in-distribution, it struggles with tail cases' — la estructura de concesión es esencial para comunicar matices técnicos."},
{n:33,type:"ml",title:"STAR Stories: Building Your ML Interview Story Bank",focus:"ML Engineering — Interview Prep / Behavioral",teoria:`BANK DE 5 HISTORIAS STAR PARA ML:\nPrepara y memoriza UNA historia para cada categoría:\n\n1. TECHNICAL CHALLENGE: "A model that underperformed and how you fixed it"\n   → S: imbalanced dataset, 95% majority class\n   → T: improve recall on minority class without sacrificing precision\n   → A: SMOTE + class weights + PR-AUC as primary metric\n   → R: recall increased 40% with <2% precision drop\n\n2. COLLABORATION/DISAGREEMENT: "Tech decision you disagreed with"\n   → Frame: "I respectfully pushed back because the data showed..."\n\n3. FAILURE/LEARNING: "A model that failed in production"\n   → Frame: "The root cause was training-serving skew; I implemented..."\n\n4. AMBIGUITY: "An ML problem with unclear requirements"\n   → Frame: "I ran a scoping workshop to align on the metric..."\n\n5. IMPACT AT SCALE: "Your most impactful ML project"\n   → Always quantify: "This reduced [cost/latency] by X% / served Y users"\n\nPRACTICE: Graba en voz alta cada historia. Target: 90-120 segundos por historia, sin "ums".`,search:`"ML engineer behavioral interview STAR method stories examples" | "machine learning engineer tell me about yourself answer"`,toefl:"La estructura STAR (Situation → Task → Action → Result) entrena la narración causal secuencial — la misma lógica que los pasajes de causa-efecto del TOEFL.",ml:"Tener 5 historias STAR memorized y pulidas significa que en la entrevista destinas energía cognitiva a adaptarlas, no a construirlas desde cero bajo presión."},
{n:34,type:"toefl",title:"TOEFL Reading: Process of Elimination — Advanced Application",focus:"TOEFL ITP — Reading Comprehension",teoria:`ELIMINACIÓN AVANZADA — LOS 5 TIPOS DE DISTRACTOR:\n\n1. TOO EXTREME: usa "always", "never", "all", "completely"\n   → Pasajes académicos hedgean. Si la respuesta no hedgea, desconfía.\n\n2. TOO NARROW: menciona solo un detalle del párrafo, no la idea principal\n   → Para preguntas de Main Idea, esto es trampa segura\n\n3. TOO BROAD: va más allá de lo que el pasaje cubre\n   → "The author implies that all ML models are biased" — pasaje solo discute uno\n\n4. OPPOSITE: invierte la relación del texto\n   → Frecuente en cause-effect: el efecto se presenta como causa\n\n5. OUT OF SCOPE: correcto en el mundo real pero no mencionado en el texto\n   → REGLA DE ORO: si no está en el pasaje, no existe para el ITP\n\nCUANDO QUEDAN 2 OPCIONES VIABLES:\n→ La más específica, más hedgeada, y más cercana al texto = correcta`,search:`"TOEFL ITP reading process of elimination wrong answer types" | "TOEFL reading distractor analysis technique advanced"`,toefl:"Reconocer los 5 tipos de distractor convierte las preguntas difíciles de Reading en ejercicios de clasificación. Reduce errores en un 30-40% en pasajes difíciles.",ml:"Esta mentalidad de 'eliminación activa' es la misma que un MLE usa al debuggear: descartar hipótesis sistemáticamente hasta identificar la causa raíz."},
{n:35,type:"review",title:"Full TOEFL ITP Mock Exam (Timed, Condiciones Reales)",focus:"Review — Full Mock TOEFL ITP",teoria:`MOCK EXAM COMPLETO — 115 MIN EXACTOS:\n\nCONDICIONES:\n• Sin pausa. Sin diccionario. Sin notas previas.\n• Simula el orden real del ITP\n\nORDEN REAL DEL TOEFL ITP:\n1. Listening Comprehension: 30-40 min\n   - Part A: ~30 short dialogues\n   - Part B: ~8 long conversations\n   - Part C: ~3 lectures\n\n2. Structure & Written Expression: 25 min\n   - Structure: 15 items\n   - Written Expression: 25 items\n\n3. Reading Comprehension: 55 min\n   - 5 passages, ~10 questions each\n\nSCORING PBI (Scaled Score):\n• Each section: 31-68\n• Total ITP: 310-677\n• C1 target: 543+ (approx. based on CEFR mapping)\n\nPOST-MOCK PROTOCOL:\n1. Score each section\n2. Error log: categorize each wrong answer\n3. Pattern ID: which section / question type dominates errors?\n4. Week 6 adjustment: double time on weakest area`,search:`"TOEFL ITP free full practice test PDF with audio" | "TOEFL ITP complete practice test Longman Barron's"`,toefl:"Un mock timed completo es el único indicador real de tu puntaje actual. Sin él, el estudio es cualitativo — con él, es cuantitativo.",ml:"La capacidad de rendir bajo presión de tiempo es también lo que diferencia a candidatos en entrevistas live coding y design challenges."}
]},

{n:36,type:"toefl",title:"TOEFL Structure: Comparative & Superlative Structures in Academic Writing",focus:"TOEFL ITP — Structure & Written Expression",teoria:`COMPARATIVES — PATRONES ACADÉMICOS:\n\nREGULAR:\n• 1-2 syllables: faster, simpler, larger\n• 3+ syllables: more accurate, more efficient, more robust\n\nIRREGULAR (memorizar):\n• good → better → best | bad → worse → worst\n• far → further (degree) / farther (distance) → furthest/farthest\n• little → less → least | many/much → more → most\n\nTRAMPAS EN WRITTEN EXPRESSION:\n1. Double comparative: "more faster" → "faster"\n2. Illogical comparison: "The accuracy of Model A is higher than Model B."\n   → ERROR: comparas accuracy con model. FIX: "...higher than that of Model B."\n3. Superlative + present perfect: "X is the most accurate model [that] has ever been proposed."\n4. "As...as" negativos: "not as accurate as" (no "not so accurate as" — less formal)\n\nACADEMIC PATTERNS:\n"X outperforms Y by a significant margin."\n"X is comparable to / on par with Y in terms of accuracy."`,search:`"TOEFL ITP comparative superlative written expression traps" | "illogical comparison TOEFL structure section examples"`,toefl:"La comparación ilógica ('accuracy de A > model B') es una trampa sofisticada que aparece exactamente en los ítems de dificultad alta del Written Expression.",ml:"'Our model outperforms the baseline by 3.2% on NDCG@10, comparable to state-of-the-art on this benchmark' — las comparaciones precisas son el estándar de los papers y las presentaciones técnicas."},
{n:37,type:"ml",title:"Technical English Writing: Documentation, READMEs & Technical Proposals",focus:"ML Engineering — Technical Communication",teoria:`PRINCIPIOS DE ESCRITURA TÉCNICA SENIOR:\n\nREADME STRUCTURE (GitHub estándar):\n1. One-line description (what it does)\n2. Quick start (3 commands max)\n3. Architecture overview (diagram link)\n4. Configuration & parameters\n5. Contributing guidelines\n\nTECHNICAL PROPOSAL STRUCTURE:\nProblem Statement → Current State → Proposed Approach → Expected Impact → Risks & Mitigations → Timeline\n\nVOCABULARIO TÉCNICO PRECISO:\n• "leverage" (usar estratégicamente) → prefer "use" — 'leverage' is overused\n• "utilize" → prefer "use" unless technical context requires distinction\n• "implement" vs. "develop" vs. "deploy" — no son sinónimos\n• "ensure" vs. "guarantee" — en ML, casi nunca se puede guarantee\n• "significant" → always quantify: "significant (p < 0.05)" or "significant (>10% improvement)"\n\nACTIVE VOICE IN TECHNICAL WRITING:\n"We train the model" → clearer than "The model is trained by us"\nBUT: "The model was evaluated on three benchmarks" → passive is fine (agent = obvious)`,search:`"technical writing machine learning documentation best practices" | "ML README technical proposal writing English senior"`,toefl:"Los principios de escritura precisa y sin ambigüedad son exactamente lo que el TOEFL testea en sus pasajes — los buenos autores académicos siguen las mismas reglas.",ml:"La calidad de tu documentación escrita es visible para el equipo antes de conocerte. Para roles remotos internacionales, es una primera impresión crítica."},
{n:38,type:"toefl",title:"TOEFL Listening: Full Part C — Extended Lectures Strategy",focus:"TOEFL ITP — Listening Comprehension",teoria:`PART C MASTERY — EXTENDED LECTURES:\n\nTEMÁTICAS FRECUENTES EN ITP PART C:\n• Ciencias naturales (biología evolutiva, ecología, geología)\n• Historia y ciencias sociales (arqueología, psicología)\n• Procesos científicos (cómo funciona X)\n\nSECUENCIA DE ESCUCHA ÓPTIMA:\n1. Escucha activamente el TÓPICO y PUNTO PRINCIPAL (primeros 15 seg)\n2. Anota con símbolos: → * ≠ ↑↓ ?\n3. Cuando escuches "For example" → anota E en vez del detalle completo\n4. Cuando escuches "However/But" → anota CONTRASTE\n5. Presta máxima atención a la oración final — suele ser la conclusión preguntada\n\nPREGUNTAS TÍPICAS PART C:\n• "What is the lecture mainly about?" → Topic from first 15 sec\n• "According to the professor, why does X occur?" → Cause from body\n• "What can be inferred about Y?" → Conclusion or implication\n• "What does the professor say about Z?" → Detail — busca en notas\n\nMETAL MODEL: Trátalo como tomar notas en una conferencia real, no como un dictado.`,search:`"TOEFL ITP Part C listening lecture strategy academic topics" | "TOEFL listening Part C extended talks practice audio"`,toefl:"La Part C del Listening es donde se gana o pierde la sección completa. Practicar con TED-Ed Science videos a 1.0x + tomar notas con tu sistema entrena el mismo formato.",ml:"Preparar presentaciones técnicas claras para audiencias mixtas (técnicos + PMs) usa exactamente las mismas habilidades de síntesis de información densa."},
{n:39,type:"ml",title:"Cultural Fit & Values-Based Questions in International Tech Interviews",focus:"ML Engineering — Interview Prep / Cultural Fit",teoria:`PREGUNTAS DE VALORES MÁS FRECUENTES EN TECH REMOTE:\n\n"How do you handle working across time zones?"\nR: "I default to async-first communication — I document decisions in writing, use tools like Notion/Confluence, and batch synchronous time for high-bandwidth discussions. I've found that being timezone-aware actually forces better documentation practices."\n\n"How do you stay current in ML?"\nR: "I follow [specific sources: Papers With Code, Hugging Face blog, arXiv cs.LG]. I implement at least one paper per quarter on a side project. I also contribute to [community/open source]."\n— Always name specifics. Never "I read articles."\n\n"Describe your ideal team culture."\nR: "I thrive in teams with high psychological safety — where dissent is welcomed and decisions are documented. I value async-first cultures where outcomes matter over hours logged."\n\n"Why remote / why international?"\nR: "I believe the best teams are built around talent and alignment, not geography. I've found that remote-first culture tends to produce stronger written communication and documentation practices."\n\nKEY: Welcome to the Jungle audiences: European/French companies value directness + cultural awareness + work-life balance respect.`,search:`"cultural fit interview questions tech company remote international" | "Welcome to the Jungle interview tips European tech company"`,toefl:"La capacidad de responder con estructuras complejas, precisas y fluidas en tiempo real — que el TOEFL testea indirectamente — es lo que diferencia una respuesta memorizada de una convincente.",ml:"Las preguntas de cultural fit en plataformas como WTTJ son tan importantes como las técnicas para empresas que hacen hiring remoto. Tu respuesta dice cómo serás como compañero de equipo async."},
{n:40,type:"toefl",title:"TOEFL Structure: Complex Sentence Patterns — All Traps Review",focus:"TOEFL ITP — Structure & Written Expression",teoria:`REVISIÓN INTEGRADA — 10 TRAMPAS PRIORITARIAS:\n\n1. PARALLEL: "X, Y, and Z" — same grammatical form\n2. SVA INVERSION: "There are [plural]" / intervening phrases\n3. EACH/ONE: + plural noun + singular verb\n4. WHICH vs. THAT: non-restrictive vs. restrictive\n5. EMBEDDED QUESTION ORDER: "I wonder what [S+V] is" (not "what is")\n6. WOULD in if-clause: NEVER\n7. GERUND after preposition: "by training", "after deploying"\n8. PASSIVE stative: consist/contain/include → no passive\n9. DESPITE + noun: never "despite of" / never "despite that"\n10. ILLOGICAL COMPARISON: "accuracy of A > that of B" (not "> B")\n\nDRILL FORMAT:\nPara cada trampa: escribe 1 error example + 1 corrected version en tu cuaderno\nLuego haz 5 ítems de práctica de esa trampa específica`,search:`"TOEFL ITP Structure Written Expression all rules review" | "TOEFL structure 40 traps common errors practice"`,toefl:"La revisión integrada antes del examen debe ser activa (escribir ejemplos) no pasiva (releer). El cuaderno externaliza el esfuerzo cognitivo y refuerza la memoria muscular.",ml:"Este nivel de atención al detalle y corrección sistemática es exactamente el mindset que se espera en code review y en la validación de pipelines de datos."},
{n:41,type:"ml",title:"Mock Technical Interview — Live Coding + System Design Simulation",focus:"ML Engineering — Full Interview Simulation",teoria:`SIMULACRO COMPLETO ML INTERVIEW (60 min):\n\n[0-5 min] INTRODUCCIÓN:\nPractica en voz alta: "Tell me about yourself" — versión ML Engineer\nEstructura: Current role → Key ML expertise → Why this company → Impact\nTarget: 90 segundos, sin notas\n\n[5-20 min] TECHNICAL QUESTION:\nElige una: "Explain how you would build a fraud detection system"\nO: "Walk me through how BERT's attention mechanism works"\nUsa: Concept → Analogy → Technical Detail → Trade-off\n\n[20-40 min] SYSTEM DESIGN:\n"Design the ML system for a news recommendation engine"\nUsa: Requirements → Data → Model → Serving → Monitoring\nHabla mientras diseñas. Verbalizar el razonamiento ES el examen.\n\n[40-55 min] BEHAVIORAL (STAR x2):\n• "Tell me about a time you improved a model's performance significantly."\n• "Describe a technical disagreement you had and how you resolved it."\n\n[55-60 min] PREGUNTAS AL ENTREVISTADOR (practica 3 preguntas):\n• "What does the ML infrastructure look like today?"\n• "How does the team evaluate model impact on business metrics?"\n• "What's the biggest technical challenge the ML team faces right now?"`,search:`"ML engineer full interview simulation mock 2024" | "machine learning system design interview walkthrough YouTube"`,toefl:"Hablar en inglés técnico durante 60 min seguidos con fluidez y precisión es el objetivo dual: lo que el TOEFL mide indirectamente y lo que la entrevista exige directamente.",ml:"Hacer este simulacro grabado y escucharte te da el feedback más honesto posible. Identifica: ¿Dónde pierdes fluidez? ¿Dónde tu vocabulario técnico falla?"},
{n:42,type:"review",title:"Week 6 Review: Error Log Analysis + Targeted Drilling",focus:"Review — Targeted Error Correction",teoria:`ANÁLISIS DE ERROR LOG — SEMANAS 1-6:\n\nPASO 1: Revisa todos tus mocks y ejercicios\nClasifica cada error en una tabla:\n\n| Sección | Tipo de trampa | # errores | Semana detectado |\n|---------|---------------|-----------|------------------|\n| Structure | SVA con inversión | 4 | Sem 1-3 |\n| Reading | Inference/implication | 6 | Sem 2-5 |\n| Listening | Attitude/function | 3 | Sem 4-6 |\n\nPASO 2: Ranking de trampas por frecuencia\nTus TOP 3 errores = 100% de tu foco en la Semana 7\n\nPASO 3: ML Interview Gap Analysis\n• ¿Qué preguntas te generan más ansiedad?\n• ¿Dónde pierdes fluidez o precisión?\n• ¿Cuál de las 5 historias STAR sigue sintiéndose no natural?\n\nPASO 4: Prepara plan de ataque para los últimos 3 días`,search:`"TOEFL error analysis improvement strategy" | "how to analyze TOEFL practice test mistakes"`,toefl:"El análisis de errores sistemático convierte la práctica random en progreso medible. Sin él, se pueden cometer los mismos errores en semana 7 que en semana 1.",ml:"El post-mortem y la retrospectiva estructurada — el mismo proceso que usas aquí — son herramientas fundamentales de equipos de ML de alto rendimiento."}

{n:43,type:"toefl",title:"Day 43: Full TOEFL ITP Mock + Error Pattern Final Review",focus:"TOEFL ITP — Full Timed Mock",teoria:`PROTOCOLO DÍA 43 — MOCK FINAL:\n\n[0-45 min] FULL TIMED MOCK (si no hiciste uno completo el día 35):\nO si ya tienes score del día 35 → foco en sección débil:\n• Si Listening es débil: 3 lectures + 2 conversation sets ITP\n• Si Structure es débil: 40 ítems con todos los patrones de trampa\n• Si Reading es débil: 2 pasajes académicos densos + análisis de cada opción incorrecta\n\n[45-60 min] REVISIÓN DE ERRORES DEL MOCK:\nPara cada error:\n1. ¿Qué tipo de trampa fue? (nombra la categoría)\n2. ¿En qué momento del proceso cometiste el error? (velocidad / distractor / falta de regla)\n3. ¿Cuál es la regla correcta? Escríbela en el cuaderno\n\nMENTAL STATE PREP:\n"En este punto, ya domino los patrones. El examen testea lo que ya sé.\nMi trabajo ahora es ejecutar con calma y velocidad, no aprender cosas nuevas."`,search:`"TOEFL ITP full practice test free audio 2024" | "TOEFL ITP practice test Longman complete PDF download"`,toefl:"El día 43 es el último diagnóstico cuantitativo. Lo que descubras aquí define exactamente las 2 horas que le dedicas al día 44.",ml:"La mentalidad de 'yo ya sé esto, ahora ejecuto' es la misma que necesitas en el día de una entrevista importante."},
